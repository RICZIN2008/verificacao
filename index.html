<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDK Security</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050505;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

.box {
    text-align: center;
    background: #111;
    padding: 30px;
    border-radius: 20px;
    min-width: 280px;
}

.loader {
    width: 45px;
    height: 45px;
    border: 5px solid #333;
    border-top: 5px solid white;
    border-radius: 50%;
    animation: girar 1s linear infinite;
    margin: 20px auto;
}

@keyframes girar {
    100% { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="box" id="tela">
    <div class="loader"></div>
    <h2>Verificando ambiente...</h2>
</div>

<script>
// 1. Pega os dados do ambiente e parâmetros da URL
let ua = navigator.userAgent.toLowerCase();
const urlParams = new URLSearchParams(window.location.search);
const appParam = urlParams.get('app');

// 2. Variáveis de identificação do seu aplicativo
const PACKAGE_NAME = "com.tdk.onion";
const APP_NAME = "tdk_";

// 3. Verificação por comportamento de embutimento (cadeia de sites do app)
let dentroDoApp = window.top !== window.self || window.frames.length > 0;

// 4. Validação dos critérios do seu App
// Libera se o parâmetro na URL for enviado (?app=tdk_), se o pacote for identificado ou se o fluxo rodar em cadeia interna do app
let ehAppOficial = (appParam === APP_NAME) || ua.includes(PACKAGE_NAME) || ua.includes(APP_NAME) || dentroDoApp;

// Bloqueio de segurança contra navegadores puros de Desktop/Bots fora do app
let ehBot = navigator.webdriver || ua.includes("headless");
let ehDesktop = !ua.includes("mobile") && !ua.includes("android") && !ua.includes("iphone");

if (ehAppOficial && !ehBot && !ehDesktop) {
    // SE FOR O SEU APP: Libera o redirecionamento liso
    setTimeout(() => {
        window.location.replace("https://tdk000999.base44.app");
    }, 2000);
} else {
    // SE FOR OUTRO AMBIENTE (Navegador comum): Fica "off" (travado no loader infinito)
    console.log("Aguardando inicialização pelo pacote oficial...");
}
</script>

</body>
</html>
