<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDK Security</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050505;
    font-family: Arial, sans-serif;
    color: white;
}

.box {
    text-align: center;
    background: #111;
    padding: 30px;
    border-radius: 20px;
}

.vermelho {
    background: #700000;
    animation: pulse 1s infinite;
}

.loader {
    width: 45px;
    height: 45px;
    border: 5px solid #333;
    border-top: 5px solid white;
    border-radius: 50%;
    animation: girar 1s linear infinite;
    margin: auto;
}

@keyframes girar {
    100% { transform: rotate(360deg); }
}

@keyframes pulse {
    50% { box-shadow: 0 0 40px red; }
}
</style>
</head>

<body>

<div class="box" id="tela">
    <div class="loader"></div>
    <h2>Verificando segurança...</h2>
</div>

<script>
let ua = navigator.userAgent.toLowerCase();

// 1. Detecta navegadores comuns
let navegador = 
    ua.includes("chrome") ||
    ua.includes("firefox") ||
    ua.includes("safari") ||
    ua.includes("edge") ||
    ua.includes("opr") ||
    ua.includes("opera") ||
    ua.includes("brave");

// 2. Detecta WebView com precisão mobile
// WebViews no Android geralmente têm 'wv' OU a string 'version/'
// WebViews no iOS não costumam incluir 'safari' no UA
let isAndroidWebView = ua.includes("android") && (ua.includes("wv") || (ua.includes("chrome") && ua.includes("version/")));
let isIOSWebView = (ua.includes("iphone") || ua.includes("ipad")) && !ua.includes("safari");
let isSocialWebView = ua.includes("fbav") || ua.includes("instagram") || ua.includes("tiktok") || ua.includes("line");

let app = isAndroidWebView || isIOSWebView || isSocialWebView || navigator.standalone === true;

// 3. Detecta automação/bot 
// (NOTA: Removidas as verificações de innerHeight/outerWidth que causam falsos positivos no mobile)
let bot = 
    navigator.webdriver ||
    window.callPhantom ||
    window._phantom ||
    ua.includes("headless") ||
    ua.includes("puppeteer") ||
    ua.includes("playwright");

// 4. Detecta iframe suspeito
let frame = window.top !== window.self;

// 5. Função de bloqueio
function violacao(texto){
    document.getElementById("tela").className = "box vermelho";
    document.getElementById("tela").innerHTML = `
        <h1>⚠️ VIOLAÇÃO DETECTADA</h1>
        <p>${texto}</p>
        <div class="loader"></div>
        <p>Acesso bloqueado</p>
    `;

    setInterval(() => {
        console.log("Bloqueado");
        location.reload();
    }, 3000);
}

// 6. Lógica de Validação
// Se for reconhecido como um navegador de desktop normal (sem ser webview), ou for bot, ou iframe:
if ((navegador && !app) || bot || frame) {
    violacao("Navegador não autorizado");
} 
// Caso contrário, liberar para o aplicativo
else {
    setTimeout(() => {
        window.location.href = "https://tdk000999.base44.app";
    }, 2000);
}
</script>

</body>
</html>
