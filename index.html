<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste de Loop Completo</title>

<style>
body {
    margin: 0;
    background: #1e1e1e;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

#desktop {
    position: relative;
    width: 100vw;
    height: 100vh;
}

.window {
    position: absolute;
    width: 280px;
    height: 180px;
    background: #fff;
    border: 1px solid #333;
    box-shadow: 0 10px 25px rgba(0,0,0,.6);
    border-radius: 6px;
    overflow: hidden;
    animation: open .2s ease;
}

.titlebar {
    height: 30px;
    background: #005A9E;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-size: 13px;
    font-weight: bold;
}

.content {
    padding: 15px;
    text-align: center;
    font-size: 14px;
    color: #333;
}

@keyframes open {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div id="desktop"></div>

<script>
// Recupera o número da janela salvo para não zerar no celular
let currentDisplayNum = sessionStorage.getItem('window_num') ? parseInt(sessionStorage.getItem('window_num')) : 0;

// Função para detectar se é dispositivo móvel (Android/iOS)
function isMobile() {
    return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
}

function startWindowLoop() {
    // Incrementa o contador de 1 a 5
    currentDisplayNum++;
    if (currentDisplayNum > 5) {
        currentDisplayNum = 1;
    }
    // Salva o estado atual no navegador
    sessionStorage.setItem('window_num', currentDisplayNum);
    
    // Cria a janela visual no "desktop" da página
    const w = document.createElement("div");
    w.className = "window";
    w.style.left = (Math.random() * 65) + "vw";
    w.style.top  = (Math.random() * 60) + "vh";

    w.innerHTML = `
        <div class="titlebar">
            <span>Janela ${currentDisplayNum}</span>
        </div>
        <div class="content">
            <p>Executando teste automatizado...</p>
        </div>
    `;
    document.getElementById("desktop").appendChild(w);

    // Separação de comportamento por plataforma
    if (isMobile()) {
        // No Celular (Android/iOS): Exibe apenas 1 janela por 2 segundos,
        // limpa a tela e atualiza do zero substituindo o histórico para não travar o botão voltar.
        setTimeout(() => {
            window.location.replace(window.location.href);
        }, 2000);
    } else {
        // No PC: Abre uma nova aba real (fora do script) e acumula até 5 janelas na tela,
        // reiniciando a contagem visual sem limpar as antigas.
        window.open('https://www.google.com', '_blank');
        setTimeout(startWindowLoop, 2000);
    }
}

// Inicializa o script automaticamente ao carregar a página
startWindowLoop();
</script>

</body>
</html>
