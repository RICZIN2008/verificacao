<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDK Security</title>
<style>
body {
    margin: 0;
    height: 100vh;
    background: #050505;
    overflow: hidden;
}
#lock {
    display: none;
    position: fixed;
    inset: 0;
    background: #050505;
    z-index: 99999;
}
.box {
    text-align: center;
    background: #111;
    padding: 30px;
    border-radius: 20px;
    min-width: 280px;
    font-family: Arial, sans-serif;
    color: white;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
.loader {
    width: 45px;
    height: 45px;
    border: 5px solid #333;
    border-top: 5px solid white;
    border-radius: 50%;
    animation: girar 1s linear infinite;
    margin: 20px auto;
}
@keyframes girar { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="lock"></div>

<div class="box">
    <div class="loader"></div>
    <h2>Verificando ambiente...</h2>
</div>

<script>
(function() {
    const UA = navigator.userAgent;
    const PARAM = new URLSearchParams(location.search).get('app');
    
    // Detecta WebView: Android tem "Version/X.X Chrome" sem "Chrome/" 
    // ou tem "wv" em versões novas
    const ehAndroidWebView = /Android.*Version\/[\d.]+.*Chrome\/[\d.]+ Mobile(?!.*Chrome\/)/i.test(UA) || UA.includes('; wv');
    
    // Se NÃO for WebView e NÃO tiver param = bloqueia
    if (!ehAndroidWebView && PARAM !== 'tdk_') {
        document.getElementById('lock').style.display = 'block';
        document.querySelector('.box').remove();
        throw new Error('Blocked');
    }
    
    // Se passou, redireciona
    setTimeout(() => {
        location.replace("https://tdk000999.base44.app");
    }, 1500);
})();
</script>

</body>
</html>
