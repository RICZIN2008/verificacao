<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>TroopDark</title>

<style>

/* =========================
RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* =========================
FUNDO ESTÁVEL
========================= */

body{
  font-family:Arial,sans-serif;
  color:#fff;
  min-height:100vh;

  background-image:url("https://files.catbox.moe/ai2gz5.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  position:relative;
  overflow-x:hidden;
}

/* overlay escuro (não quebra imagem) */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:0;
}

/* =========================
CONTEÚDO
========================= */

.hero{
  background:rgba(0,0,0,0.6);
  padding:25px;
  text-align:center;
  font-weight:bold;
  font-size:22px;
  position:relative;
  z-index:1;
}

.container{
  padding:15px;
  position:relative;
  z-index:1;
}

.title-cat{
  margin:18px 0 10px;
  color:#aaa;
  font-size:13px;
}

/* =========================
CARDS
========================= */

.cards{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-bottom:5px;
  -webkit-overflow-scrolling:touch;
}

.cards::-webkit-scrollbar{
  height:4px;
}

.cards::-webkit-scrollbar-thumb{
  background:#333;
  border-radius:20px;
}

.card{
  min-width:160px;
  max-width:160px;
  background:#1e1e1e;
  border-radius:12px;
  overflow:hidden;
  flex-shrink:0;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  background:#111;
}

.info{
  padding:10px;
}

.nome{
  font-size:13px;
  font-weight:bold;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.tipo{
  font-size:11px;
  color:#aaa;
  margin:6px 0;
}

.btn{
  display:block;
  text-align:center;
  text-decoration:none;
  background:#25D366;
  color:#fff;
  padding:8px;
  border-radius:7px;
  font-size:12px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="hero">TROOPDARK</div>

<div class="container">

  <div class="title-cat">GRUPO PRINCIPAL</div>
  <div class="cards" id="grupoPrincipal"></div>

  <div class="title-cat">CANAL PRINCIPAL</div>
  <div class="cards" id="canalPrincipal"></div>

  <div class="title-cat">GRUPOS PARCEIROS</div>
  <div class="cards" id="gruposParceiros"></div>

  <div class="title-cat">CANAIS PARCEIROS</div>
  <div class="cards" id="canaisParceiros"></div>

</div>

<script>

const IMG_PADRAO =
"https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg";

/* =========================
DADOS
========================= */

const grupoPrincipal = {
  nome: "TroopDark ᵗᵈᵏ",
  foto: "https://files.catbox.moe/lcl4vw.png",
  link: "https://chat.whatsapp.com/LBQmatzACkd7T71mcMB5hM"
};

const canalPrincipal = {
  nome: "TroopDark ᵗᵈᵏ #Channel",
  foto: "https://files.catbox.moe/lcl4vw.png",
  link: "https://whatsapp.com/channel/0029Vb7ZerTBqbr5oNdmst01"
};

const gruposParceiros = [
  {
    nome: "Sem Grupo",
    foto: "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg",
    link: "https://chat.whatsapp.com/LINK1"
  },
  {
    nome: "Sem Grupo",
    foto: "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg",
    link: "https://chat.whatsapp.com/LINK1"
  }
];

const canaisParceiros = [
  {
    nome: "Aliança AMT Channel #⁰⁰⁷🇰🇷",
    foto: "https://files.catbox.moe/o5eb0u.png",
    link: "https://whatsapp.com/channel/0029VbCZdnDJP21Amqx92B2z"
  },
  {
    nome: "Sem Channel",
    foto: "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg",
    link: "https://chat.whatsapp.com/LINK2"
  }
];

/* =========================
CARD
========================= */

function card(item, tipo){
  return `
  <div class="card">
    <img src="${item.foto || IMG_PADRAO}"
         onerror="this.src='${IMG_PADRAO}'">
    <div class="info">
      <div class="nome">${item.nome}</div>
      <div class="tipo">${tipo}</div>
      <a class="btn" href="${item.link}" target="_blank">Entrar</a>
    </div>
  </div>
  `;
}

/* =========================
RENDER
========================= */

function render(){

  document.getElementById("grupoPrincipal").innerHTML =
    card(grupoPrincipal, "Grupo");

  document.getElementById("canalPrincipal").innerHTML =
    card(canalPrincipal, "Canal");

  document.getElementById("gruposParceiros").innerHTML =
    gruposParceiros.map(g => card(g, "Grupo Parceiro")).join("");

  document.getElementById("canaisParceiros").innerHTML =
    canaisParceiros.map(c => card(c, "Canal Parceiro")).join("");
}

document.addEventListener("DOMContentLoaded", render);

</script>

</body>
</html>
