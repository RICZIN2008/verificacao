<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDK Security</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #050505;
    overflow: hidden;
}

#lock {
    display: none;
    position: fixed;
    inset: 0;
    background: #050505;
    z-index: 99999;
}

.box {
    text-align: center;
    background: #111;
    padding: 30px;
    border-radius: 20px;
    min-width: 280px;
    font-family: Arial, sans-serif;
    color: white;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.loader {
    width: 45px;
    height: 45px;
    border: 5px solid #333;
    border-top: 5px solid white;
    border-radius: 50%;
    animation: girar 1s linear infinite;
    margin: 20px auto;
}

@keyframes girar {
    100% {
        transform: rotate(360deg);
    }
}
</style>

</head>

<body>

<div id="lock">
</div>

<div class="box">
    <div class="loader"></div>
    <h2>Verificando ambiente...</h2>
</div>


<script>

(function(){

    const UA = navigator.userAgent;

    // Detecta Android WebView (AppMint e similares)
    const ehAndroid = /Android/i.test(UA);

    const ehWebView = ehAndroid && (
        UA.includes("wv") ||
        UA.includes("WebView") ||
        !UA.includes("Chrome")
    );


    // Permite navegador somente com parâmetro
    const PARAM = new URLSearchParams(location.search).get("app");


    // Bloqueia fora do app
    if(!ehWebView && PARAM !== "tdk_"){

        document.getElementById("lock").style.display = "block";

        document.querySelector(".box").innerHTML =
        `
        <h2 style="color:red">
        Acesso permitido somente pelo APP
        </h2>
        `;

        throw new Error("Bloqueado");

    }


    // Abre o site
    setTimeout(function(){

        window.location.href =
        "https://tdk000999.base44.app";

    },1500);


})();

</script>


</body>
</html>
