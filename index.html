<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDK Security</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050505;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

.box {
    text-align: center;
    background: #111;
    padding: 30px;
    border-radius: 20px;
    min-width: 280px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.vermelho {
    background: #700000;
    animation: pulse 1s infinite;
}

.loader {
    width: 45px;
    height: 45px;
    border: 5px solid #333;
    border-top: 5px solid white;
    border-radius: 50%;
    animation: girar 1s linear infinite;
    margin: 20px auto;
}

@keyframes girar {
    100% { transform: rotate(360deg); }
}

@keyframes pulse {
    50% { box-shadow: 0 0 40px red; }
}
</style>
</head>
<body>

<div class="box" id="tela">
    <div class="loader"></div>
    <h2>Verificando segurança...</h2>
</div>

<script>
let ua = navigator.userAgent.toLowerCase();

// 1. Identifica se é um computador (Navegadores Desktop que devem ser bloqueados)
let isDesktop = !ua.includes("mobile") && !ua.includes("android") && !ua.includes("iphone") && !ua.includes("ipad");

// 2. Identifica automação (Bots)
let bot = 
    navigator.webdriver ||
    window.callPhantom ||
    window._phantom ||
    ua.includes("headless") ||
    ua.includes("puppeteer") ||
    ua.includes("playwright");

// 3. Função de Bloqueio
let loopBloqueio = null;
function violacao(texto){
    document.getElementById("tela").className = "box vermelho";
    document.getElementById("tela").innerHTML = `
        <h1>⚠️ VIOLAÇÃO DETECTADA</h1>
        <p>${texto}</p>
        <div class="loader"></div>
        <p>Acesso bloqueado</p>
    `;
    if(!loopBloqueio) {
        loopBloqueio = setInterval(() => {
            location.reload();
        }, 3000);
    }
}

// 4. LÓGICA DE VALIDAÇÃO REFEITA
// Em vez de tentar adivinhar o WebView pelo UA capto do Moto G06, 
// nós bloqueamos apenas se for estritamente um Computador/Desktop ou um Bot de automação.
if (isDesktop || bot) {
    violacao("Acesso permitido apenas pelo aplicativo oficial.");
} 
// Libera o acesso para dispositivos móveis (seu app WebView)
else {
    if(loopBloqueio) clearInterval(loopBloqueio);
    
    setTimeout(() => {
        window.location.replace("https://tdk000999.base44.app");
    }, 2000);
}
</script>

</body>
</html>
