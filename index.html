<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDK Security</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #050505; /* Tela preta por padrão */
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* O estilo do loader só aparece se for injetado pelo script do App */
.box {
    text-align: center;
    background: #111;
    padding: 30px;
    border-radius: 20px;
    min-width: 280px;
}

.loader {
    width: 45px;
    height: 45px;
    border: 5px solid #333;
    border-top: 5px solid white;
    border-radius: 50%;
    -webkit-animation: girar 1s linear infinite;
    animation: girar 1s linear infinite;
    margin: 20px auto;
}

@-webkit-keyframes girar {
    100% { -webkit-transform: rotate(360deg); }
}
@keyframes girar {
    100% { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div id="container-seguro"></div>

<script>
// 1. Identificação do Ambiente
let ua = navigator.userAgent.toLowerCase();
const urlParams = new URLSearchParams(window.location.search);
const appParam = urlParams.get('app');

const PACKAGE_NAME = "com.tdk.onion";
const APP_NAME = "tdk_";

// Rastreia se está na estrutura de frames/redirecionamento do app
let dentroDoApp = window.top !== window.self || window.frames.length > 0;

// Validação estrita do App Oficial
let ehAppOficial = (appParam === APP_NAME) || ua.includes(PACKAGE_NAME) || ua.includes(APP_NAME) || dentroDoApp;

// Filtros de bloqueio para navegadores puros e automações
let ehBot = navigator.webdriver || ua.includes("headless");
let ehDesktop = !ua.includes("mobile") && !ua.includes("android") && !ua.includes("iphone");

// 2. Fluxo de Execução Decisivo
if (ehAppOficial && !ehBot && !ehDesktop) {
    
    // SE FOR O SEU APP: Monta o visual de carregamento na hora
    document.getElementById("container-seguro").innerHTML = `
        <div class="box">
            <div class="loader"></div>
            <h2>Verificando ambiente...</h2>
        </div>
    `;

    // Executa o redirecionamento para o site final
    setTimeout(() => {
        window.location.replace("https://tdk000999.base44.app");
    }, 1500);

} else {
    // SE ESTIVER FORA DO APP (Navegador comum): 
    // O código morre aqui. A página fica eternamente preta e sem nenhuma função ativa.
    console.clear();
}
</script>

</body>
</html>
