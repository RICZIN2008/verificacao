<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste de Abertura de Abas</title>

<style>
body {
    margin: 0;
    background: #1e1e1e;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

#desktop {
    position: relative;
    width: 100vw;
    height: 100vh;
}

.window {
    position: absolute;
    width: 300px;
    height: 200px;
    background: #fff;
    border: 1px solid #333;
    box-shadow: 0 10px 25px rgba(0,0,0,.6);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer; /* Mostra que a janela inteira é clicável */
    transition: transform 0.2s;
}

.window:hover {
    transform: scale(1.02);
}

.titlebar {
    height: 30px;
    background: #0078d7; /* Cor de destaque */
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-size: 13px;
    font-weight: bold;
}

.content {
    padding: 15px;
    text-align: center;
    font-size: 14px;
    color: #333;
}

.hint {
    margin-top: 20px;
    color: #666;
    font-size: 11px;
}
</style>
</head>

<body>

<div id="desktop"></div>

<script>
let windowCount = 0;

function createTestWindow() {
    windowCount++;
    
    const w = document.createElement("div");
    w.className = "window";

    w.style.left = (Math.random() * 60) + "vw";
    w.style.top  = (Math.random() * 60) + "vh";

    w.innerHTML = `
        <div class="titlebar">
            <span>Teste ${windowCount}</span>
        </div>
        <div class="content">
            <p><strong>Clique aqui</strong> para abrir uma aba real</p>
            <p class="hint">URL: google.com</p>
        </div>
    `;

    // EVENTO DE CLIQUE: Essencial para burlar o bloqueador de pop-ups
    w.addEventListener('click', () => {
        // '_blank' força abrir uma nova aba.
        // No PC, se o navegador permitir, adicionar parâmetros como 'width=600' tentaria abrir uma janela externa,
        // mas no Celular sempre abrirá como uma nova aba comum.
        window.open('https://www.google.com', '_blank');
    });

    document.getElementById("desktop").appendChild(w);

    // Cria apenas até 5 janelas de teste na tela para não poluir
    if (windowCount < 5) {
        setTimeout(createTestWindow, 800);
    }
}

// Inicia o gerador de janelas de teste
createTestWindow();
</script>

</body>
</html>
