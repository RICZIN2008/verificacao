<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDK Security</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050505;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

.box {
    text-align: center;
    background: #111;
    padding: 30px;
    border-radius: 20px;
    min-width: 280px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    z-index: 10;
}

.vermelho {
    background: #700000;
    animation: pulse 1s infinite;
}

.loader {
    width: 45px;
    height: 45px;
    border: 5px solid #333;
    border-top: 5px solid white;
    border-radius: 50%;
    animation: girar 1s linear infinite;
    margin: 20px auto;
}

@keyframes girar {
    100% { transform: rotate(360deg); }
}

@keyframes pulse {
    50% { box-shadow: 0 0 40px red; }
}
</style>
</head>

<body>

<div class="box" id="tela">
    <div class="loader"></div>
    <h2>Verificando segurança...</h2>
</div>

<script>
let ua = navigator.userAgent.toLowerCase();

// 1. Detecta se é um navegador de desktop/mobile comum
let navegador = 
    ua.includes("chrome") ||
    ua.includes("firefox") ||
    ua.includes("safari") ||
    ua.includes("edge") ||
    ua.includes("opr") ||
    ua.includes("opera") ||
    ua.includes("brave");

// 2. Detecta se o ambiente atual é o seu Aplicativo (WebView)
let isAndroidWebView = ua.includes("android") && (ua.includes("wv") || (ua.includes("chrome") && ua.includes("version/")));
let isIOSWebView = (ua.includes("iphone") || ua.includes("ipad")) && !ua.includes("safari");
let isSocialWebView = ua.includes("fbav") || ua.includes("instagram") || ua.includes("tiktok") || ua.includes("line");

let app = isAndroidWebView || isIOSWebView || isSocialWebView || navigator.standalone === true;

// 3. Detecta ferramentas de automação (Bots)
let bot = 
    navigator.webdriver ||
    window.callPhantom ||
    window._phantom ||
    ua.includes("headless") ||
    ua.includes("puppeteer") ||
    ua.includes("playwright");

// 4. Detecta encadeamento/iframes
let frame = window.top !== window.self;

// Guardar o ID do intervalo para podermos pará-lo se necessário
let loopBloqueio = null;

// 5. Função de Bloqueio por Violação
function violacao(texto){
    // Altera o layout para erro
    document.getElementById("tela").className = "box vermelho";
    document.getElementById("tela").innerHTML = `
        <h1>⚠️ VIOLAÇÃO DETECTADA</h1>
        <p>${texto}</p>
        <div class="loader"></div>
        <p>Acesso bloqueado</p>
    `;

    // Só ativa o recarregamento se ele já não estiver rodando
    if(!loopBloqueio) {
        loopBloqueio = setInterval(() => {
            console.log("Bloqueado");
            location.reload();
        }, 3000);
    }
}

// 6. Execução da Validação de Segurança
// REGRA: Se for detectado como navegador normal de fora do app, ou bot, ou frame externo sem ser o app, BLOQUEIA.
if ((navegador && !app) || bot || (frame && !app)) {
    violacao("Navegador não autorizado");
} 
// Se passar no teste e for o seu APP carregando o fluxo:
else {
    // Garante que nenhum loop de segurança pendente vai rodar e estragar a próxima tela
    if(loopBloqueio) {
        clearInterval(loopBloqueio);
    }
    
    // Executa o redirecionamento limpo para o app prosseguir
    setTimeout(() => {
        window.location.replace("https://tdk000999.base44.app");
    }, 2000);
}
</script>

</body>
</html>
