<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste de Loop - Celular</title>

<style>
body {
    margin: 0;
    background: #1e1e1e;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

#desktop {
    position: relative;
    width: 100vw;
    height: 100vh;
}

.window {
    position: absolute;
    width: 280px;
    height: 180px;
    background: #fff;
    border: 1px solid #333;
    box-shadow: 0 10px 25px rgba(0,0,0,.6);
    border-radius: 6px;
    overflow: hidden;
}

.titlebar {
    height: 30px;
    background: #005A9E;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-size: 13px;
    font-weight: bold;
}

.content {
    padding: 15px;
    text-align: center;
    font-size: 14px;
    color: #333;
}
</style>
</head>

<body>

<div id="desktop"></div>

<script>
// Armazena o número atual da janela no sessionStorage para não perder o valor ao recarregar a página
let currentDisplayNum = sessionStorage.getItem('window_num') ? parseInt(sessionStorage.getItem('window_num')) : 0;

function isMobile() {
    return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
}

function startWindowLoop() {
    // Lógica do contador (1 a 5)
    currentDisplayNum++;
    if (currentDisplayNum > 5) {
        currentDisplayNum = 1;
    }
    // Salva o próximo número para a próxima vez que a página carregar
    sessionStorage.setItem('window_num', currentDisplayNum);
    
    // 1. Cria APENAS UMA janela simulada na tela
    const w = document.createElement("div");
    w.className = "window";
    w.style.left = (Math.random() * 65) + "vw";
    w.style.top  = (Math.random() * 60) + "vh";

    w.innerHTML = `
        <div class="titlebar">
            <span>Janela ${currentDisplayNum}</span>
        </div>
        <div class="content">
            <p>Carregando página do zero...</p>
        </div>
    `;
    document.getElementById("desktop").appendChild(w);

    // 2. Comportamento por dispositivo
    if (isMobile()) {
        // No Celular: Aguarda 2 segundos exibindo a janela única e força o recarregamento do zero (true)
        setTimeout(() => {
            window.location.reload();
        }, 2000);
    } else {
        // No PC: Continua abrindo a aba real e chama a próxima janela em 2 segundos
        window.open('https://www.google.com', '_blank');
        setTimeout(startWindowLoop, 2000);
    }
}

// Inicia o script
startWindowLoop();
</script>

</body>
</html>
