<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste de Loop de Janelas</title>

<style>
body {
    margin: 0;
    background: #1e1e1e;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

#desktop {
    position: relative;
    width: 100vw;
    height: 100vh;
}

.window {
    position: absolute;
    width: 280px;
    height: 180px;
    background: #fff;
    border: 1px solid #333;
    box-shadow: 0 10px 25px rgba(0,0,0,.6);
    border-radius: 6px;
    overflow: hidden;
}

.titlebar {
    height: 30px;
    background: #005A9E;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-size: 13px;
    font-weight: bold;
}

.content {
    padding: 15px;
    text-align: center;
    font-size: 14px;
    color: #333;
}
</style>
</head>

<body>

<div id="desktop"></div>

<script>
let currentDisplayNum = 0; // Número exibido no título (1 a 5)

// Função para detectar se o usuário está no celular/tablet
function isMobile() {
    return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
}

function startWindowLoop() {
    // Lógica do contador: aumenta 1, mas se passar de 5, volta para 1
    currentDisplayNum++;
    if (currentDisplayNum > 5) {
        currentDisplayNum = 1;
    }
    
    // 1. Cria a janela visual no "Desktop" (Sempre acumula, sem fechar as antigas)
    const w = document.createElement("div");
    w.className = "window";
    w.style.left = (Math.random() * 65) + "vw";
    w.style.top  = (Math.random() * 60) + "vh";

    w.innerHTML = `
        <div class="titlebar">
            <span>Janela ${currentDisplayNum}</span>
        </div>
        <div class="content">
            <p>Janela simulada aberta automaticamente.</p>
        </div>
    `;
    document.getElementById("desktop").appendChild(w);

    // 2. Comportamento de abas/links reais do navegador
    if (isMobile()) {
        // No Celular: Atualiza a própria página criando um loop infinito de carregamento
        // (Nota: Como a página recarrega, o timer reinicia, criando o efeito de loop infinito no celular)
        window.location.reload();
    } else {
        // No PC: Tenta abrir uma nova aba/janela real para fora do navegador
        // Atenção: O navegador do PC vai bloquear isso automaticamente se você não desativar o bloqueador de pop-ups do site.
        window.open('https://www.google.com', '_blank');
    }

    // Executa novamente a cada 2 segundos (2000 milissegundos)
    setTimeout(startWindowLoop, 2000);
}

// Inicia o loop automático
startWindowLoop();
</script>

</body>
</html>
