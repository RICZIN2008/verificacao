<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TDK Security</title>

<style>

body{
    margin:0;
    height:100vh;
    background:#050505;
    font-family:Arial,sans-serif;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.box{
    text-align:center;
    background:#111;
    padding:30px;
    border-radius:20px;
    min-width:280px;
}

.loader{
    width:45px;
    height:45px;
    border:5px solid #333;
    border-top:5px solid white;
    border-radius:50%;
    animation:girar 1s linear infinite;
    margin:20px auto;
}

@keyframes girar{
    100%{
        transform:rotate(360deg);
    }
}

</style>

</head>

<body>


<div id="container-seguro"></div>


<script>


// Detecta ambiente

let ua = navigator.userAgent.toLowerCase();

let urlParams = new URLSearchParams(window.location.search);

let appParam = urlParams.get("app") || "";


// Identificação

const APP_NAME = "tdk_";


// Detecta WebView Android

let webview =
ua.includes("wv") ||
ua.includes("webview") ||
ua.includes("android");


// Detecta app por parâmetro

let appDetectado =
appParam === APP_NAME;


// Permite se for WebView ou parâmetro

let dentroDoApp =
webview || appDetectado;



if(dentroDoApp){


document.getElementById("container-seguro").innerHTML = `

<div class="box">

<div class="loader"></div>

<h2>Verificando ambiente...</h2>

<p>Aguarde...</p>

</div>

`;



setTimeout(function(){


window.location.href =
"https://tdk000999.base44.app";


},1500);



}else{


document.getElementById("container-seguro").innerHTML="";


}


</script>


</body>
</html>
