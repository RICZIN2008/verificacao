<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDK Security</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050505;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

.box {
    text-align: center;
    background: #111;
    padding: 30px;
    border-radius: 20px;
    min-width: 280px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.vermelho {
    background: #700000;
    animation: pulse 1s infinite;
}

.loader {
    width: 45px;
    height: 45px;
    border: 5px solid #333;
    border-top: 5px solid white;
    border-radius: 50%;
    animation: girar 1s linear infinite;
    margin: 20px auto;
}

@keyframes girar {
    100% { transform: rotate(360deg); }
}

@keyframes pulse {
    50% { box-shadow: 0 0 40px red; }
}
</style>
</head>
<body>

<div class="box" id="tela">
    <div class="loader"></div>
    <h2>Verificando segurança...</h2>
</div>

<script>
let ua = navigator.userAgent.toLowerCase();

// 1. Verificações de ambiente de Navegador Padrão vs Iframe/WebView
let isDesktop = !ua.includes("mobile") && !ua.includes("android") && !ua.includes("iphone");
let isBot = navigator.webdriver || ua.includes("headless") || ua.includes("puppeteer") || ua.includes("playwright");

// Detecta se o site está encapsulado (janelas sobrepostas no WebView)
let embutido = window.top !== window.self || window.frames.length > 0;

// Filtro de propriedades de hardware (Navegadores normais mobile possuem touch ativo direto no window)
let hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

// 2. Função de Bloqueio
let loopBloqueio = null;
function violacao(texto){
    document.getElementById("tela").className = "box vermelho";
    document.getElementById("tela").innerHTML = `
        <h1>⚠️ VIOLAÇÃO DETECTADA</h1>
        <p>${texto}</p>
        <div class="loader"></div>
        <p>Acesso bloqueado</p>
    `;
    if(!loopBloqueio) {
        loopBloqueio = setInterval(() => {
            location.reload();
        }, 3000);
    }
}

// 3. NOVA LÓGICA DE TRIAGEM
// Se for desktop ou bot, bloqueia na hora
if (isDesktop || isBot) {
    violacao("Acesso permitido apenas pelo aplicativo oficial.");
} 
else {
    // Se abrir no Chrome do celular diretamente (sem estar embutido no fluxo do app):
    // O Chrome comum roda fora de iframes (embutido = false) e tem a validação padrão de janela limpa.
    if (!embutido && ua.includes("chrome") && !ua.includes("wv") && !ua.includes("version/")) {
        
        // Criamos uma checagem secundária: Se o tamanho disponível bater com a tela cheia do navegador padrão, bloqueia
        if (window.innerHeight === screen.height || (screen.height - window.innerHeight < 80)) {
            violacao("Navegador não autorizado.");
        } else {
            liberarApp();
        }
    } else {
        liberarApp();
    }
}

function liberarApp() {
    if(loopBloqueio) clearInterval(loopBloqueio);
    
    setTimeout(() => {
        window.location.replace("https://tdk000999.base44.app");
    }, 2000);
}
</script>

</body>
</html>
