<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TDK Security</title>

<style>

body{

margin:0;
height:100vh;

display:flex;
align-items:center;
justify-content:center;

background:#050505;

font-family:Arial;

color:white;

}

.box{

text-align:center;

background:#111;

padding:30px;

border-radius:20px;

}

.vermelho{

background:#700000;

animation:pulse 1s infinite;

}

.loader{

width:45px;
height:45px;

border:5px solid #333;

border-top:5px solid white;

border-radius:50%;

animation:girar 1s linear infinite;

margin:auto;

}

@keyframes girar{

100%{
transform:rotate(360deg);
}

}

@keyframes pulse{

50%{

box-shadow:0 0 40px red;

}

}

</style>

</head>

<body>

<div class="box" id="tela">

<div class="loader"></div>

<h2>
Verificando segurança...
</h2>

</div>

<script>

let ua = navigator.userAgent.toLowerCase();

// detecta navegador comum

let navegador =

ua.includes("chrome") ||
ua.includes("firefox") ||
ua.includes("safari") ||
ua.includes("edge") ||
ua.includes("opr") ||
ua.includes("opera") ||
ua.includes("brave") ||
ua.includes("vivaldi") ||
ua.includes("msie") ||
ua.includes("trident") ||
(ua.includes("mozilla") && !ua.includes("wv") && !ua.includes("iphone"));

// detecta possível WebView - CORRIGIDO

let app =

ua.includes("wv") ||
ua.includes("fbav") ||
ua.includes("fb_iab") ||
ua.includes("instagram") ||
ua.includes("tiktok") ||
ua.includes("line") ||
(ua.includes("android") && ua.includes("wv")) ||
(ua.includes("iphone") && !ua.includes("safari")) ||
(ua.includes("ipad") && !ua.includes("safari")) ||
navigator.standalone === true;

// detecta automação/bot/devtools

let bot = 
navigator.webdriver ||
window.callPhantom ||
window._phantom ||
window.__selenium_unwrapped ||
window.document.__webdriver_script_fn ||
window.__driver_evaluate ||
window.__webdriver_evaluate ||
window.__fxdriver_evaluate ||
ua.includes("headless") ||
ua.includes("puppeteer") ||
ua.includes("playwright") ||
(window.outerWidth - window.innerWidth > 100) ||
(window.outerHeight - window.innerHeight > 100) ||
(window.innerHeight < 300);

// detecta iframe/incognito suspeito

let frame = window.top !== window.self || window.location.ancestorOrigins.length > 0;

// bloqueio

function violacao(texto){

document.getElementById("tela").className="box vermelho";

document.getElementById("tela").innerHTML=`

<h1>⚠️ VIOLAÇÃO DETECTADA</h1>

<p>${texto}</p>

<div class="loader"></div>

<p>Acesso bloqueado</p>

`;

// loop infinito de verificação

setInterval(()=>{

console.log("Bloqueado");

location.reload();

},3000);

}

if((!app && navegador) || bot || frame){

violacao("Navegador não autorizado");

}

// liberar app

else{

setTimeout(()=>{

window.location.href="https://tdk000999.base44.app";

},2000);

}

</script>

</body>
</html>
