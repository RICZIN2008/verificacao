<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TDK Security</title>

<style>

body{
    margin:0;
    height:100vh;
    background:#050505;
    font-family:Arial,sans-serif;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.box{
    text-align:center;
    background:#111;
    padding:30px;
    border-radius:20px;
    min-width:280px;
}

.loader{
    width:45px;
    height:45px;
    border:5px solid #333;
    border-top:5px solid white;
    border-radius:50%;
    animation:girar 1s linear infinite;
    margin:20px auto;
}

@keyframes girar{

100%{
    transform:rotate(360deg);
}

}

</style>

</head>


<body>


<div id="container"></div>


<script>


const APP_NAME = "tdk_";

let ua = navigator.userAgent.toLowerCase();

let params = new URLSearchParams(window.location.search);

let app = params.get("app");


// valida app

let autorizado =
app === APP_NAME ||
ua.includes(APP_NAME);



if(autorizado){


document.getElementById("container").innerHTML = `

<div class="box">

<div class="loader"></div>

<h2>Verificando ambiente...</h2>

</div>

`;


setTimeout(()=>{

window.location.replace(
"https://tdk000999.base44.app"
);

},1500);



}else{


// sem autorização

setInterval(()=>{

location.reload();

},1000);


}



</script>


</body>
</html>
