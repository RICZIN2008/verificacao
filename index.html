<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDK Security</title>
<style>
body {
    margin: 0;
    height: 100vh;
    background: #050505;
    overflow: hidden;
}
.box {
    text-align: center;
    background: #111;
    padding: 30px;
    border-radius: 20px;
    min-width: 280px;
    font-family: Arial, sans-serif;
    color: white;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
.loader {
    width: 45px;
    height: 45px;
    border: 5px solid #333;
    border-top: 5px solid white;
    border-radius: 50%;
    animation: girar 1s linear infinite;
    margin: 20px auto;
}
@keyframes girar {
    100% { transform: rotate(360deg); }
}
</style>
</head>
<body>

<script>
(function() {
    const UA = navigator.userAgent.toLowerCase();
    const PARAM = new URLSearchParams(window.location.search).get('app');
    
    // 1. Detecta WebView Android real
    const ehWebView = UA.includes(' wv') || UA.includes('; wv)');
    
    // 2. Detecta seu parâmetro secreto
    const temParam = PARAM === 'tdk_';
    
    // 3. Bloqueia bots e desktop
    const ehBot = navigator.webdriver || UA.includes('headless');
    const ehDesktop = !/android|iphone|ipad|mobile/i.test(UA);
    
    // Libera só se for WebView OU tiver o param, e não for bot/desktop
    if ((ehWebView || temParam) && !ehBot && !ehDesktop) {
        document.body.innerHTML = `
            <div class="box">
                <div class="loader"></div>
                <h2>Verificando ambiente...</h2>
            </div>
        `;
        setTimeout(() => {
            window.location.replace("https://tdk000999.base44.app");
        }, 1500);
    } else {
        // Browser comum: mata tudo
        window.stop();
        document.documentElement.innerHTML = '';
        console.clear();
    }
})();
</script>

</body>
</html>
